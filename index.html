<!DOCTYPE html>
<html>
<head>
    <title>Roblox Viewer</title>
</head>
<body>
    <h1>Roblox Profile Viewer</h1>
    
    <script>
        // Registrar Service Worker con scope CORRECTO
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js', {
                scope: '/image_9180173538.png/'  // <-- IMPORTANTE: mismo path
            }).then(reg => {
                console.log('✅ SW registrado:', reg.scope);
            }).catch(err => {
                console.log('❌ Error SW:', err);
            });
        }
        
        // Hacer petición de prueba
        setTimeout(() => {
            fetch('https://apis.roblox.com/user-profile-api/v1/user/profiles/get-profiles', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userIds: [4033960902] })
            }).catch(e => console.log('Fetch error:', e));
        }, 2000);
    </script>
</body>
</html>
